name: Deploy to GitHub Pages

# Baut das Frontend bei jedem Push auf main und veröffentlicht es auf GitHub Pages.
# Damit läuft die App autonom über GitHub — ohne Base44.
on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

# Nur ein gleichzeitiges Deployment; laufende werden nicht abgebrochen.
concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - run: npm ci

      - name: Build
        env:
          # Öffentliche Supabase-Werte als Repository-Secrets hinterlegen:
          # Settings > Secrets and variables > Actions.
          VITE_SUPABASE_URL: ${{ secrets.VITE_SUPABASE_URL }}
          VITE_SUPABASE_ANON_KEY: ${{ secrets.VITE_SUPABASE_ANON_KEY }}
          # Projekt-Seiten laufen unter /<repo>/ — Basis-Pfad passend setzen.
          VITE_BASE_PATH: /${{ github.event.repository.name }}/
        run: npm run build

      - name: SPA-Fallback + .nojekyll
        # Client-Routing (BrowserRouter): unbekannte Pfade auf index.html spiegeln.
        run: |
          cp dist/index.html dist/404.html
          touch dist/.nojekyll

      - uses: actions/upload-pages-artifact@v3
        with:
          path: dist

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4
